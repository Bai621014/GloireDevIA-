[pytest]
# Mode auto pour gérer les tests asynchrones sans décoration manuelle
asyncio_mode = auto

# Définition stricte de la portée des fixtures pour éviter les fuites de mémoire
asyncio_default_fixture_loop_scope = function

# Chemins de recherche des tests
testpaths = tests

# Masque de détection des fichiers de tests
python_files = test_*.py

# Options recommandées pour une exécution propre
addopts = -v --tb=short
