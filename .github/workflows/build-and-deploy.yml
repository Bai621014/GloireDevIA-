name: GloirePay — Pipeline Souverain

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  audit-et-simulation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Simulation de Sécurité (Alchemy)
        env:
          ALCHEMY_API_KEY: ${{ secrets.ALCHEMY_API_KEY }}
          POLYGON_RPC_URL: ${{ secrets.POLYGON_RPC_URL }}
        run: |
          echo ">>> [AUDIT] Test de connectivité du nœud..."
          curl -X POST "$POLYGON_RPC_URL/$ALCHEMY_API_KEY" \
            -H "Content-Type: application/json" \
            --data '{"jsonrpc":"2.0","method":"eth_blockNumber","params":[],"id":1}'
          echo ">>> [SUCCESS] Audit validé."

  deploy:
    needs: audit-et-simulation
    runs-on: ubuntu-latest
    steps:
      - name: Déploiement souverain
        run: echo ">>> [DEPLOY] Mise en production validée."
