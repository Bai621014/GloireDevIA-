  deploy:
    needs: audit-et-simulation
    runs-on: ubuntu-latest
    env:
      # Utilisation du nouveau nom pour votre clé privée
      GLOBALE_CLE_PRIVEE: ${{ secrets.GLOBALE_CLE_PRIVEE }}
      POLYGON_RPC_URL: ${{ secrets.POLYGON_RPC_URL }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
          
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Installation des dépendances
        run: pip install web3

      - name: Exécution du transfert souverain
        run: python execute_transfer.py
