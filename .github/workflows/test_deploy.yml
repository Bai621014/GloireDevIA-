name: GloirePay — Test Automatique Déploiement GLC

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  test-and-verify:
    runs-on: ubuntu-latest

    steps:
      - name: Récupération du Code Source
        uses: actions/checkout@v3

      - name: Configuration de Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Installation des dépendances Web3 & Compilateur
        run: |
          python -m pip install --upgrade pip
          pip install web3 py-solc-x

      - name: Exécution du Test de Déploiement Souverain
        env:
          POLYGON_RPC_URL: "https://rpc-amoy.polygon.technology"
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          SOVEREIGN_OWNER_ADDRESS: ${{ secrets.SOVEREIGN_OWNER_ADDRESS }}
          TREASURY_ADDRESS: ${{ secrets.TREASURY_ADDRESS }}
        run: |
          python -u test_deploy_amoy.py
